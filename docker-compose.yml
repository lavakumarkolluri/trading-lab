services:
  vscode:
    image: codercom/code-server:latest
    container_name: vscode
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/home/coder/workspace
      - vscode-data:/home/coder/.local
      - .:/home/coder/trading-lab
    environment:
      - PASSWORD=yourpassword
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config/default-user.xml:/etc/clickhouse-server/users.d/default-user.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./workspace:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=yourtoken
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped

  pipeline:
    build: ./pipeline
    container_name: pipeline
    volumes:
      - ./workspace:/workspace
      - ./workspace/logs:/workspace/logs
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=
      - MINIO_HOST=minio:9000
      - MINIO_USER=admin
      - MINIO_PASSWORD=password123
    depends_on:
      - minio
      - clickhouse
    restart: "no"

  migrate:
    build: ./pipeline
    container_name: migrate
    volumes:
      - ./clickhouse:/clickhouse
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=
    depends_on:
      - clickhouse
    restart: "no"
    entrypoint: ["python", "/clickhouse/migrate.py"]
    command: ["--run"]

  mf_pipeline:
    build: ./pipeline
    container_name: mf_pipeline
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=
    depends_on:
      - clickhouse
    restart: "no"
    entrypoint: ["python", "mf_pipeline.py"]

volumes:
  vscode-data:
  minio-data:
  clickhouse-data:
  portainer-data: