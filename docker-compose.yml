services:
  vscode:
    image: codercom/code-server:latest
    container_name: vscode
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/home/coder/workspace
      - vscode-data:/home/coder/.local
      - .:/home/coder/trading-lab
    environment:
      - PASSWORD=${VSCODE_PASSWORD}
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config/default-user.xml:/etc/clickhouse-server/users.d/default-user.xml
    environment:
      CH_PASSWORD: ${CH_PASSWORD}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./workspace:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped

  pipeline:
    build: ./pipeline
    container_name: pipeline
    volumes:
      - ./workspace:/workspace
      - ./workspace/logs:/workspace/logs
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=${CH_PASSWORD}
      - MINIO_HOST=minio:9000
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  migrate:
    build: ./pipeline
    container_name: migrate
    volumes:
      - ./clickhouse:/clickhouse
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=${CH_PASSWORD}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    entrypoint: ["python", "/clickhouse/migrate.py"]
    command: ["--run"]

  mf_pipeline:
    build: ./pipeline
    container_name: mf_pipeline
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=${CH_PASSWORD}
