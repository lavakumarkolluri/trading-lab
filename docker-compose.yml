      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - TZ=${TZ:-Asia/Kolkata}
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /tmp/intraday_heartbeat && [ $(( $(date +%s) - $(cat /tmp/intraday_heartbeat) )) -lt 1200 ]"]
      interval: 5m
      timeout: 10s
      retries: 2
      start_period: 10m
    logging: *default-logging
    entrypoint: ["python", "option_chain_intraday.py"]
