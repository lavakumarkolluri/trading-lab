  scheduler:
    build: *pipeline-build
    container_name: scheduler
    volumes:
      # rw required — scheduler spawns sub-containers AND does git pull for auto-deploy
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/trading-lab
    environment:
      - COMPOSE_FILE=/trading-lab/docker-compose.yml
      # HOST_PROJECT_DIR: HOST-side absolute path so DooD docker compose run
      # passes the correct bind-mount source to the host Docker daemon.
      - HOST_PROJECT_DIR=${PWD}
      - TZ=${TZ:-Asia/Kolkata}
      - CH_PASSWORD=${CH_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    # Heartbeat: scheduler writes .scheduler_state/heartbeat every loop iteration.
    # Healthcheck alerts if the file is not updated within 5 minutes (H4).
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /trading-lab/.scheduler_state/heartbeat && [ $(( $(date +%s) - $(cat /trading-lab/.scheduler_state/heartbeat) )) -lt 300 ]"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 1m
    logging: *default-logging
    restart: unless-stopped
    entrypoint: ["python", "scheduler.py"]

  # ClickHouse backup: weekly export of key market tables to local volume (M7).
  # Runs every Sunday at 10:00 UTC (15:30 IST) after cleanup job.
  clickhouse-backup:
    image: clickhouse/clickhouse-server:26.2
    container_name: clickhouse-backup
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          NOW=$$(date +%Y-%m-%d)
          BACKUP_DIR=/backups/$$NOW
          mkdir -p $$BACKUP_DIR
          echo "[backup] Starting ClickHouse export for $$NOW"
          for TABLE in market.options_eod_summary market.fo_lot_sizes analysis.scorecard market.trading_holidays; do
            FILE=$$BACKUP_DIR/$$(echo $$TABLE | tr '.' '_').native
            clickhouse-client --host clickhouse --password "$$CH_PASSWORD" \
              --query "SELECT * FROM $$TABLE" --format Native > $$FILE 2>/dev/null \
              && echo "[backup] Exported $$TABLE ($$( wc -c < $$FILE ) bytes)" \
              || echo "[backup] WARN: failed to export $$TABLE"
          done
          find /backups -maxdepth 1 -type d -mtime +30 -exec rm -rf {} + 2>/dev/null || true
          echo "[backup] Done — sleeping 24h"
          sleep 86400
        done
    environment:
      - CH_PASSWORD=${CH_PASSWORD}
    volumes:
      - ./backups:/backups
    depends_on:
      clickhouse:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

volumes:
