# Shared build config for all pipeline services — passes current git SHA so
# running containers know which code version they contain.
x-pipeline-build: &pipeline-build
  context: ./pipeline
  args:
    GIT_SHA: ${GIT_SHA:-unknown}

services:
  vscode:
    image: codercom/code-server:latest
    container_name: vscode
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/home/coder/workspace
      - vscode-data:/home/coder/.local
      - .:/home/coder/trading-lab
    environment:
      - PASSWORD=${VSCODE_PASSWORD}
      - TZ=Asia/Kolkata
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      TZ: Asia/Kolkata
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config/default-user.xml:/etc/clickhouse-server/users.d/trading-lab-user.xml
      - ./clickhouse/config/log-retention.xml:/etc/clickhouse-server/config.d/log-retention.xml
    environment:
      CH_PASSWORD: ${CH_PASSWORD}
      # Required: v26 entrypoint disables network access for default user if
      # CLICKHOUSE_PASSWORD is absent — from_env XML alone is not sufficient.
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
      TZ: Asia/Kolkata
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # Tests actual auth, not just /ping — /ping returns 200 even with wrong password
      test: ["CMD", "clickhouse-client", "--password", "${CH_PASSWORD}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./workspace:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - TZ=Asia/Kolkata
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9443:9443"
    volumes:
      # rw required — Portainer needs full daemon access to manage containers/images
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped

  pipeline:
    build: *pipeline-build
    container_name: pipeline
    volumes:
      - ./workspace:/workspace
      - ./workspace/logs:/workspace/logs
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=${CH_PASSWORD}
      - MINIO_HOST=minio:9000
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - TZ=Asia/Kolkata
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  migrate:
    build: *pipeline-build
    container_name: migrate
    volumes:
      - ./clickhouse:/clickhouse
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=${CH_PASSWORD}
      - TZ=Asia/Kolkata
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    entrypoint: ["python", "/clickhouse/migrate.py"]
