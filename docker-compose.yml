      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=${CH_PASSWORD}
      - TZ=Asia/Kolkata
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    entrypoint: ["python", "compute_greeks.py"]
    command: []

  data_freshness_check:
    build: *pipeline-build
    container_name: data_freshness_check
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CH_USER=default
      - CH_PASSWORD=${CH_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TZ=Asia/Kolkata
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    entrypoint: ["python", "data_freshness_check.py"]
    command: []

  scheduler:
    build: *pipeline-build
    container_name: scheduler
    volumes:
      # rw required — scheduler spawns sub-containers AND does git pull for auto-deploy
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/trading-lab
    environment:
      - COMPOSE_FILE=/trading-lab/docker-compose.yml
      - TZ=Asia/Kolkata
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped
    entrypoint: ["python", "scheduler.py"]

volumes:
  vscode-data:
  minio-data:
  clickhouse-data:
  portainer-data: